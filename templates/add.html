{% extends "layout.html" %}

{% block body %}


<div class="add-container">
    <div class="add-card">
        <h2>Start a New Habit</h2>
        <p>What goal do you want to conquer next?</p>

        <form action="/add" method="post">
            
            <div class="form-group">
                <label for="name">Habit Name</label>
                <input 
                    autocomplete="off"
                    autofocus
                    id="name"
                    name="name" 
                    placeholder="e.g., Read for 20 minutes" 
                    type="text"
                    required
                >
            </div>

            <div class="form-group">
                <label for="target_days">Weekly Target (Days)</label>
                <input 
                    id="target_days"
                    name="target_days" 
                    placeholder="Days per week (1-7)" 
                    type="number"
                    min="1"
                    max="7"
                    required
                >
            </div>

            <button type="submit" class="btn-submit">+ Add Habit</button>
        </form>

        <a href="/" class="cancel-link">Cancel</a>
    </div>
</div>
{% endblock %}
