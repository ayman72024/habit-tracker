{% extends "layout.html" %}

{% block body %}
<style>
    /* Centering and Container */
    .add-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 70vh;
    }

    .add-card {
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        width: 100%;
        max-width: 450px;
        /* Using the Gold brand color here to symbolize a new, exciting goal */
        border-top: 5px solid #C9A050; 
    }

    .add-card h2 {
        color: #333;
        font-size: 1.8rem;
        margin-bottom: 5px;
        font-weight: 800;
        text-align: center;
    }

    .add-card p {
        color: #666;
        text-align: center;
        margin-bottom: 25px;
        font-size: 0.95rem;
    }

    /* Form Layout */
    .form-group {
        text-align: left;
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        font-weight: 600;
        margin-bottom: 8px;
        color: #444;
        font-size: 0.9rem;
    }

    .form-group input {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e0e0e0;
        border-radius: 10px;
        font-size: 1rem;
        box-sizing: border-box;
        transition: all 0.3s ease;
    }

    .form-group input:focus {
        outline: none;
        border-color: #00796B;
        box-shadow: 0 0 0 4px rgba(0, 121, 107, 0.1);
    }

    /* Action Buttons */
    .btn-submit {
        width: 100%;
        background-color: #00796B;
        color: white;
        padding: 14px;
        border: none;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: background-color 0.2s, transform 0.1s;
        margin-top: 10px;
    }

    .btn-submit:hover {
        background-color: #005a50;
    }

    .btn-submit:active {
        transform: scale(0.98);
    }

    /* Cancel Link */
    .cancel-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        color: #546E7A;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.9rem;
        transition: color 0.2s;
    }

    .cancel-link:hover {
        color: #C62828;
        text-decoration: underline;
    }
</style>

<div class="add-container">
    <div class="add-card">
        <h2>Start a New Habit</h2>
        <p>What goal do you want to conquer next?</p>

        <form action="/add" method="post">
            
            <div class="form-group">
                <label for="name">Habit Name</label>
                <input 
                    autocomplete="off"
                    autofocus
                    id="name"
                    name="name" 
                    placeholder="e.g., Read for 20 minutes" 
                    type="text"
                    required
                >
            </div>

            <div class="form-group">
                <label for="target_days">Weekly Target (Days)</label>
                <input 
                    id="target_days"
                    name="target_days" 
                    placeholder="Days per week (1-7)" 
                    type="number"
                    min="1"
                    max="7"
                    required
                >
            </div>

            <button type="submit" class="btn-submit">+ Add Habit</button>
        </form>

        <a href="/" class="cancel-link">Cancel</a>
    </div>
</div>
{% endblock %}
