<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <title>Habit Tracker | Build Your Better Self</title>
</head>
<body>

    <nav>
        <a href="/" class="brand">
            <svg width="32" height="32" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="48" fill="#00796B" />
                <path d="M30,50 l15,15 l30,-30" stroke="white" stroke-width="10" fill="none" stroke-linecap="round"/>
            </svg>
            <span class="brand-name">Habit <span class="brand-sub">Tracker</span></span>
        </a>

        <div class="nav-links">
            {% if session.get("user_id") %}
                <a href="/add" class="btn-add">+ Add Habit</a>
                <a href="/logout" class="btn-logout">Logout</a>
            {% else %}
                <a href="/login">Login</a>
                <a href="/register">Register</a>
            {% endif %}
        </div>
    </nav>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div id="flash-popup-container">
                {% for message in messages %}
                    <div class="flash-popup">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <div class="container">
        {% block body %}{% endblock %}
    </div>
     <script>
    setTimeout(() => {
        const popups = document.querySelectorAll(".flash-popup");
        popups.forEach(popup => {
            popup.classList.add("hide");
            setTimeout(() => popup.remove(), 600);
        });
    }, 2500);
</script>
</body>
</html>
