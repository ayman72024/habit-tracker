{% extends "layout.html" %}

{% block body %}


<div class="edit-container">
    <div class="edit-card">
        <h2>Refine Your Habit</h2>
        <p>Update your goals for <strong>{{ habit.name }}</strong>.</p>

        <form action="/edit/{{ habit.id }}" method="post">
            
            <div class="form-group">
                <label for="name">Habit Name</label>
                <input 
                    type="text" 
                    id="name" 
                    name="name" 
                    placeholder="e.g., Read 10 pages" 
                    value="{{ habit.name }}" 
                    required
                >
            </div>

            <div class="form-group">
                <label for="target_days">Weekly Target (Days)</label>
                <input 
                    type="number" 
                    id="target_days" 
                    name="target_days" 
                    min="1" 
                    max="7" 
                    placeholder="Days per week" 
                    value="{{ habit.target_days }}" 
                    required
                >
            </div>

            <button type="submit" class="btn-save">Save Changes</button>
        </form>

        <a href="/" class="cancel-link">Cancel and return to Dashboard</a>
    </div>
</div>
{% endblock %}
