{% extends "layout.html" %}

{% block body %}
<style>
    /* Centering the login card on the screen */
    .login-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 70vh; /* Adjusts based on header height */
    }

    .login-card {
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        width: 100%;
        max-width: 400px;
        text-align: center;
    }

    .login-card h2 {
        color: #00796B;
        font-size: 2rem;
        margin-bottom: 10px;
        font-weight: 800;
    }

    .login-card p {
        color: #666;
        margin-bottom: 30px;
        font-size: 0.95rem;
    }

    /* Form Styling */
    .form-group {
        text-align: left;
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        font-weight: 600;
        margin-bottom: 8px;
        color: #333;
        font-size: 0.9rem;
    }

    .form-group input {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e0e0e0;
        border-radius: 10px;
        font-size: 1rem;
        box-sizing: border-box; /* Prevents input from overflowing */
        transition: border-color 0.3s, box-shadow 0.3s;
    }

    .form-group input:focus {
        outline: none;
        border-color: #00796B;
        box-shadow: 0 0 0 4px rgba(0, 121, 107, 0.1);
    }

    /* Button Styling */
    .btn-login {
        width: 100%;
        background-color: #00796B;
        color: white;
        padding: 14px;
        border: none;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: background-color 0.2s, transform 0.1s;
        margin-top: 10px;
    }

    .btn-login:hover {
        background-color: #005a50;
    }

    .btn-login:active {
        transform: scale(0.98);
    }

    /* Footer link */
    .register-link {
        margin-top: 25px;
        font-size: 0.9rem;
        color: #666;
    }

    .register-link a {
        color: #C9A050;
        text-decoration: none;
        font-weight: 700;
    }

    .register-link a:hover {
        text-decoration: underline;
    }
</style>

<div class="login-container">
    <div class="login-card">
        <h2>Welcome Back</h2>
        <p>Please enter your details to continue tracking.</p>

        <form action="/login" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">Sign In</button>
        </form>

        <div class="register-link">
            Don't have an account? <a href="/register">Create one now</a>
        </div>
    </div>
</div>
{% endblock %}
